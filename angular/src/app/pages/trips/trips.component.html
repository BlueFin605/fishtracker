<section>
    <h2>All Trips</h2>
    <div class="switch-container">
        <label class="switch">
            <input type="checkbox" (change)="toggleTrips($event)" [checked]="relevantTrips">
            <span class="slider round"></span>
        </label>
        <span class="switch-label">Relevant Trips Only</span>
    </div>
    <div class="trips-toolbar">
        <button type="button"
                class="share-selected-button"
                [disabled]="selectedTripIds.size === 0"
                (click)="openShareDialog()">
            Share selected ({{ selectedTripIds.size }})
        </button>
    </div>
    <table>
        <thead>
            <tr>
                <th></th>
                <th>Start</th>
                <th>End</th>
                <th>Notes</th>
                <th>catchSize</th>
                <th>rating</th>
                <th>tags</th>
                <th>Moon Phase</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let trip of trips" (click)="navigateToTripCatch(trip.tripId)">
                <td (click)="$event.stopPropagation()">
                    <input type="checkbox"
                           [checked]="isTripSelected(trip.tripId)"
                           (change)="toggleTripSelection(trip.tripId, $event)">
                </td>
                <td>
                    {{ trip.startTime | dateFormat}}
                    <i *ngIf="isPending(trip)" class="fas fa-cloud-upload-alt sync-pending-icon" title="Waiting to sync"></i>
                </td>
                <td>{{ trip.endTime | dateFormat}}</td>
                <td>{{ trip.notes }}</td>
                <td>{{ trip.catchSize }}</td>
                <td>{{ trip.rating }}</td>
                <td>{{ trip.tags }}</td>
                <td>{{ trip.moonPhase }}</td>
                <td>
                    <i class="fas fa-trash" (click)="confirmDeleteTrip(trip.tripId, $event)"></i>
                </td>
            </tr>
        </tbody>
    </table>
</section>

<app-share-dialog *ngIf="shareDialogOpen"
                  [availableTrips]="availableTripsForDialog"
                  [preselectedTripIds]="selectedTripIdsArr"
                  (closed)="onShareDialogClosed($event)"></app-share-dialog>
