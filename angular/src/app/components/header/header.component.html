<ng-container *ngIf="authService.isAuthenticated() ; else loggedOut">
    <header>
        <nav class="nav-links">
            <!-- <a class="nav-link" [routerLink]="['/trips']">Trips</a> -->
            <button class="favicon-button" [routerLink]="['/trips']">
              <img src="favicon.png" alt="Trips" class="favicon-icon">
            </button>             
            <a *ngIf="showStartTrip" class="nav-link button-link" [routerLink]="['/newtrip']">Start Trip</a>
            <span class="sync-indicator" *ngIf="(syncState$ | async) as syncState">
                <i *ngIf="syncState === 'syncing'" class="fas fa-sync fa-spin" title="Syncing..."></i>
                <span *ngIf="syncState === 'pending'" class="sync-pending" title="Items waiting to sync">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span class="sync-count">{{ pendingCount$ | async }}</span>
                </span>
                <i *ngIf="syncState === 'authExpired'" class="fas fa-exclamation-triangle sync-auth-warning" title="Re-login needed to sync"></i>
            </span>
        </nav>
        <div class="avatar-menu">
            <button mat-icon-button [matMenuTriggerFor]="menu" class="avatar-button" [title]="authService.userDisplayName || authService.userEmail">
              <span class="avatar-initial">{{ authService.userInitial }}</span>
            </button>
            <mat-menu #menu="matMenu">
              <div class="menu-user-info" *ngIf="authService.userDisplayName || authService.userEmail">
                <span class="menu-user-name">{{ authService.userDisplayName }}</span>
                <span class="menu-user-email" *ngIf="authService.userEmail">{{ authService.userEmail }}</span>
              </div>
              <button mat-menu-item (click)="onPreferences()">Preferences</button>
              <button mat-menu-item (click)="onDebug()">Debug</button>
              <button mat-menu-item (click)="onLogout()">Log out</button>
            </mat-menu>
          </div>    </header>
</ng-container>

<ng-template #loggedOut>
    <!-- <app-auth-button></app-auth-button> -->
</ng-template>
